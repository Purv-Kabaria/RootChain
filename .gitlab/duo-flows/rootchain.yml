name: rootchain
description: >
  RootChain traces production Sentry errors to their SDLC origin using
  four GitLab Orbit domains: source_code (symbols + files), code_review
  (merge requests + blast radius via CALLS edges), security (active
  vulnerabilities in blamed files), and ci (pipeline status per MR).
  When Sentry creates a GitLab issue, this flow queries all four domains
  in parallel, builds a confidence-ranked blame chain, surfaces any
  co-located CVEs, and posts a structured Markdown comment with a
  clickable Mermaid blame graph.
version: 1

trigger:
  events:
    - work_item_created

filter:
  labels:
    any_of:
      - sentry-alert
      - Sentry
  title_matches: '^\[Sentry\]|\[Error\]|TypeError|ValueError|NullPointerException|RuntimeError|ReferenceError|panic'

context:
  goal: |
    A Sentry production error has been automatically filed as a GitLab issue.

    Issue details:
    - IID: {{ .WorkItem.IID }}
    - Title: {{ .WorkItem.Title }}
    - Project: {{ .WorkItem.Project.FullPath }}
    - Web URL: {{ .WorkItem.WebURL }}
    - Labels: {{ .WorkItem.Labels | join ", " }}

    Full issue description (contains the Sentry stack trace):
    ---
    {{ .WorkItem.Description }}
    ---

    Your task:
    1. First, call get_issue to check whether this issue already has the label
       "rootchain-analyzed". If yes, stop immediately — do not add any comment.

    2. Parse the Sentry error information from the issue description above.
       Identify the error type, error message, and stack frames.
       Filter out library frames (site-packages, node_modules, vendor, etc.).
       Take the top 5 non-library frames closest to the error source.

       If you find zero parseable frames, post the comment:
       "RootChain: No parseable stack trace found in this issue." and add the
       label "rootchain-analyzed", then stop.

    3. For each surviving frame (up to 5), call query_graph using the Orbit JSON DSL.
       Run all frame queries in parallel when the platform supports it.

       Orbit uses JSON DSL — NOT Cypher strings. The query_graph tool accepts
       a JSON object with "query_type", "node", "neighbors", and "limit" fields.

       STRATEGY A — File neighbors (try first):
       Call query_graph with:
         query_type: "neighbors"
         node: {id: "n", entity: "File", filters: {path: "<file_path>"}}
         neighbors: {node: "n"}
       Filter response nodes by type="MergeRequest" with merged_at present or state="merged".

       STRATEGY B — MergeRequestDiffFile neighbors (if Strategy A returns 0 MRs):
       Call query_graph with:
         query_type: "neighbors"
         node: {id: "n", entity: "MergeRequestDiffFile", filters: {new_path: "<file_path>"}}
         neighbors: {node: "n"}
       Again filter for MergeRequest nodes.

       STRATEGY C — old_path fallback (if Strategy B also returns 0 — for renamed files):
       Same as Strategy B but with filters: {old_path: "<file_path>"}
       If this is the only strategy that succeeds, set fallback_used=true (multiply confidence by 0.7).

       If all strategies return 0 MergeRequest nodes: mark that frame as "orbit_miss".
       Do not guess or fabricate MR information.

       NOTE: The Orbit response format uses a "result" key (not "data"), and node
       properties are FLAT on the node object (no "properties" sub-dict):
         {"result": {"nodes": [{"id": "mr:1", "type": "MergeRequest", "iid": 1, ...}], "edges": []}}
       If "web_url" is missing: construct it as {gitlab_url}/{project_path}/-/merge_requests/{iid}.

    4. For each MR found, make ONE query_graph call to get enrichment data
       (linked work items, reviewers, and pipeline status all at once):
         query_type: "neighbors"
         node: {id: "n", entity: "MergeRequest", filters: {iid: <mr_iid>}}
         neighbors: {node: "n"}
       Then filter by node type:
         - "WorkItem" → linked issues (iid, title, state, web_url)
         - "User" → reviewer usernames
         - "Pipeline" → CI status (use most recent by created_at; map to ✅/❌/🔄/⏳)
       If "web_url" is missing on WorkItem: construct it as {gitlab_url}/{project_path}/-/issues/{iid}.

    4b. For each frame, run two additional queries IN PARALLEL:

        Blast radius — neighbors of the Definition node:
          query_type: "neighbors"
          node: {id: "n", entity: "Definition", filters: {name: "<function_name>"}}
          neighbors: {node: "n"}
        Count neighbor nodes of type "Definition" with a different name.
        That is the caller_count. If 0 or errors, use caller_count = 0.

        Security findings (Vulnerability traversal):
          query_type: "traversal"
          node: {id: "n", entity: "Vulnerability", filters: {file_path: "<file_path>"}}
          limit: 3
        Filter for state="detected" or "confirmed". Sort by severity (critical first).
        If no results: no security section in the output. Do not fabricate.

    5. Score each frame using this formula:
       - days_since = days since mr.merged_at
       - recency = 1.0 / (1 + days_since / 30)
       - depth = 1.0 / frame_depth   (frame 1 = closest to error = depth 1)
         NOTE: frame 1 = FIRST listed non-library frame in the Sentry issue (not reversed)
       - blast = min(caller_count / 10.0, 1.0)   (use 0 if caller_count unavailable)
       - confidence = recency * 0.5 + depth * 0.35 + blast * 0.15
       - If fallback (file-level) was used: multiply confidence * 0.7
       - If orbit_miss: confidence = 0.0

       Labels: >= 0.7 = HIGH (🔴), 0.4–0.69 = MEDIUM (🟡), < 0.4 = LOW (🟢)

       If two frames point to the same MR iid: keep only the higher-confidence entry.

    6. The primary_suspect is the entry with the highest confidence score >= 0.4.
       If none meet the threshold, note it in the comment.

    7. Build the Markdown comment following the exact format in your SKILL.md.
       Call create_note with this comment as the body.

    8. Call add_label with the label "rootchain-analyzed".

steps:
  - name: parse_and_trace
    type: agent
    description: >
      Parse the Sentry stack trace, query Orbit for each frame's SDLC history,
      build a confidence-ranked blame chain, and post the analysis comment.
    skills:
      - rootchain
    tools:
      - query_graph
      - create_note
      - add_label
      - get_issue
    max_iterations: 30
    timeout_seconds: 180
