app = "rootchain-receiver"
primary_region = "iad"

[build]
  dockerfile = "receiver/Dockerfile"
  dockerfile_context = "."

[env]
  ROOTCHAIN_LOG_FORMAT = "json"
  ROOTCHAIN_LOG_LEVEL = "INFO"
  ROOTCHAIN_WEBHOOK_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "5s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
