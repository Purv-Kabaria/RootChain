stages:
  - lint
  - test
  - validate
  - smoke

default:
  image: python:3.11-slim
  before_script:
    - pip install --quiet -e ".[dev]"

lint:ruff:
  stage: lint
  script:
    - ruff check src/ tests/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

lint:mypy:
  stage: lint
  script:
    - pip install --quiet mypy
    - mypy src/rootchain/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

test:unit:
  stage: test
  script:
    - pytest tests/unit/ --cov=src/rootchain --cov-report=term-missing --cov-fail-under=80
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

validate:flow:
  stage: validate
  script:
    - pip install --quiet pyyaml
    - python scripts/validate_flow.py .gitlab/duo-flows/rootchain.yml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

smoke:orbit:
  stage: smoke
  script:
    - python scripts/test_orbit_connection.py
  variables:
    ROOTCHAIN_GITLAB_TOKEN: $ROOTCHAIN_GITLAB_TOKEN
    ROOTCHAIN_GITLAB_URL: $ROOTCHAIN_GITLAB_URL
    ROOTCHAIN_GROUP_PATH: $ROOTCHAIN_GROUP_PATH
    ROOTCHAIN_PROJECT_PATH: $ROOTCHAIN_PROJECT_PATH
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  allow_failure: true
